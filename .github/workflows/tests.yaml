name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - 
        name: Checkout code
        uses: actions/checkout@v6

      - 
        name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - 
        name: Download dependencies
        run: go mod download
      - 
        name: Run unit tests
        run: go test -race -v ./...
      -
        name: Build
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ots .